name: CI

on:
  pull_request:
  push:
    branches: [main]

# No production credentials and no live API calls run in CI. Live model
# evaluation (test:evaluation -- --live) and the production smoke test are
# manual-only and never run here.
jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit + integration tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Offline evaluation (deterministic, no model calls)
        run: npm run test:evaluation -- --offline

      - name: Upload evaluation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: eval-results/
          if-no-files-found: ignore
